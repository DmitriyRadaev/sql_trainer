<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Медицинский SQL Тренажер</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container-fluid d-flex align-items-center shadow">
        <img src="img/samgmu-logo.jpg" style="width: 160px;" class="me-3">
        <div style="border-left: 1px solid #ccc; height: 50px;"></div>
        <div class="ms-3">
            <div class="d-flex">
                <img src="img/logo_sql.png" style="width:30px;">
                <h4 class="text-primary mb-0">SQL Тренажер</h4>
            </div>
            <h6 class="text-uppercase mt-0 mb-0" style="font-size: 12px; color: #010101; font-weight: 400;">Кафедра медицинской физики, математики и информатики</h6>
        </div>
    </div>
    <div class="container-fluid mt-3">        
        <div class="main-content">
            <div class="sidebar">
                <h3>Упражнения</h3>
                <div id="exercises-list"></div>                
                
                <h3 class="d-flex align-items-center justify-content-between w-100 mt-4">Схема БД <i class="fas fa-database text-primary ms-3"></i></h3>                  
                <div id="schema-info"></div>
            </div>
            
            <div class="workspace">
                <div class="query-editor">
                    <div class="d-flex justify-content-between align-items-center">
                        <h3>Введите SQL запрос:</h3>
                        <button id="theory-btn" class="btn btn-sm btn-secondary"><i class="fas fa-book-reader me-2"></i> Теоретическая справка</button>
                    </div>

                    <textarea id="sql-query" rows="6" placeholder="SELECT * FROM patients;"></textarea>
                    <button id="execute-btn" class="btn btn-primary">Выполнить запрос</button>
                </div>
                
                  <!-- Блок для сообщения о валидации -->
				<div id="validation-message" style="display: none;"></div>
				
				<div class="results">
					<h3>Результаты:</h3>
					<div id="query-results"></div>
					<div id="row-count"></div>
				</div>
                
                <div class="error-message" id="error-message"></div>
            </div>
        </div>
    </div>

    <!-- Модальное окно для теории -->
    <div id="theoryModal" class="theory-modal">
        <div class="theory-modal-content">
            <div class="theory-modal-header">
                <h5 id="theory-modal-title">Теоретическая справка</h5>
                <span class="theory-close">&times;</span>
            </div>
            <div class="theory-modal-body" id="theory-modal-body">
            </div>
        </div>
    </div>
    
    <script src="js/script.js"></script>
	<script src="js/schema-modal.js"></script>
    <script src="js/theory-data.js"></script>
</body>
</html>
