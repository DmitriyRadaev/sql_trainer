version: '3.8'

services:
  sql_db:
    image: postgres:14
    container_name: sql_trainer_db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - sql_trainer_postgres_data:/var/lib/postgresql/data
    env_file:
      - ./backend/.env

  sql_backend:
    build:
      context: ./backend
    container_name: sql_trainer_backend
    restart: always
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=sql_db
    depends_on:
      - sql_db

  sql_nginx:
    image: nginx:latest
    container_name: sql_trainer_nginx
    ports:
      - "8081:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - sql_backend

volumes:
  sql_trainer_postgres_data: